<!DOCTYPE html>
<html> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamHub Mock Test</title>
    <link rel="stylesheet" href="after-click-sub-enroll-2.css">
</head>
<body>
<div class="container">

    <div class="start-screen" id="startScreen">
        <h1>ExamHub Mock Test</h1>
        <p>25 Questions | 20 Minutes</p>
        <button id="startBtn">Start Test</button>
    </div>

    <div class="quiz-section" id="quizSection" style="display:none;">

        <div class="header">
            <h2>Mock Test</h2>
            <div id="timer">20:00</div>
        </div>

        <div class="quiz-box">
            <div id="question"></div>
            <div id="options"></div>
            <button id="nextBtn">Next</button>
        </div>
        <div class="question-number-display-wrapper">
        <div id="question-number-display"></div>
            </div>
    </div>
</div>

<script src="DMMT1.js"></script>
</body>
</html>
